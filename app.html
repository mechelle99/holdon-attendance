<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
  <title>HOLDON 出勤系統</title>

  <style>
    :root{
      --primary1:#4F46E5; --primary2:#7C3AED;
      --bg:#F3F4F6; --card:#FFFFFF; --text:#111827; --muted:#6B7280;
      --ok:#10B981; --warn:#F59E0B; --danger:#EF4444;
      --shadow: 0 12px 30px rgba(17,24,39,.12);
      --shadow2: 0 6px 16px rgba(17,24,39,.08);
      --radius: 22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:var(--bg);
      color:var(--text);
      padding: 18px 18px calc(90px + env(safe-area-inset-bottom)) 18px;
    }
    .hero{
      background: linear-gradient(135deg, var(--primary1), var(--primary2));
      border-radius: 30px;
      padding: 22px;
      box-shadow: var(--shadow);
      position: relative;
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute; inset:-80px -60px auto auto;
      width:240px; height:240px;
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
    }
    .hero-top{
      display:flex; align-items:center; justify-content:space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .hello{
      font-size: 34px;
      font-weight: 800;
      letter-spacing: .2px;
      color: #fff;
      margin: 0;
    }
    .sub{
      margin-top: 6px;
      color: rgba(255,255,255,.82);
      font-size: 13px;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background: #FF3B30;
      box-shadow: 0 0 0 8px rgba(255,59,48,.18);
      margin-right: 10px;
      flex: 0 0 auto;
    }
    .logout{
      display:flex; align-items:center; gap:10px;
      background: rgba(255,255,255,.18);
      color:#fff;
      border:1px solid rgba(255,255,255,.22);
      padding: 10px 14px;
      border-radius: 999px;
      cursor:pointer;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }
    .logout:active{ transform: scale(.98); }

    .balances{
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }
    .bal{
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      padding: 16px;
      color:#fff;
      min-height: 86px;
      transition: opacity 0.3s ease;
    }
    .bal .num{
      font-size: 30px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .bal .lab{
      font-size: 14px;
      opacity: .9;
      font-weight: 700;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 20px;
    }
    .card{
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow2);
      min-height: 130px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      cursor:pointer;
      user-select:none;
      border: 1px solid rgba(17,24,39,.05);
      transition: transform .08s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active{ transform: scale(.99); }
    .icon{ font-size: 34px; margin-bottom: 10px; }
    .title{ font-size: 20px; font-weight: 900; margin:0; }
    .hint{ font-size: 12px; color: var(--muted); margin-top: 6px; }
    .title.in{ color: var(--ok); }
    .title.out{ color: #F59E0B; }

    .toast{
      position: fixed;
      left: 16px; right: 16px;
      top: calc(16px + env(safe-area-inset-top));
      background: #111827;
      color:#fff;
      padding: 12px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow2);
      display:none;
      z-index: 9999;
      font-size: 13px;
      line-height: 1.4;
    }

    .nav{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 12px 18px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-top-left-radius: 26px;
      border-top-right-radius: 26px;
      box-shadow: 0 -10px 30px rgba(17,24,39,.08);
      display:flex;
      justify-content: space-around;
      z-index: 1000;
    }
    .nav-item{
      text-decoration:none;
      color:#9CA3AF;
      display:flex; flex-direction:column; align-items:center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active{ color: var(--primary1); }
    .nav-icon{ font-size: 22px; }

    .disabled{
      opacity:.55;
      pointer-events:none;
      filter: grayscale(1);
    }
  </style>
</head>

<body>
  <div class="toast" id="toast"></div>

  <section class="hero">
    <div class="hero-top">
      <div>
        <h1 class="hello" id="hello">Hi, ...</h1>
        <div class="sub" id="subline">資料更新中…</div>
      </div>

      <button type="button" class="logout" id="btnLogout">
        <span class="dot"></span>登出
      </button>
    </div>

    <div class="balances">
      <div class="bal">
        <div class="num" id="annualLeft">--</div>
        <div class="lab">特休餘額（小時）</div>
      </div>
      <div class="bal">
        <div class="num" id="compLeft">--</div>
        <div class="lab">補休餘額（小時）</div>
      </div>
    </div>
  </section>

  <div class="grid">
    <div class="card" id="btnIn">
      <div class="icon">☀️</div>
      <h3 class="title in">上班打卡</h3>
      <div class="hint" id="hintIn">點一下完成打卡</div>
    </div>

    <div class="card" id="btnOut">
      <div class="icon">🌙</div>
      <h3 class="title out">下班打卡</h3>
      <div class="hint" id="hintOut">點一下完成打卡</div>
    </div>
  </div>

  <nav class="nav">
    <a href="app.html" class="nav-item active"><span class="nav-icon">🏠</span>首頁</a>
    <a href="request.html" class="nav-item"><span class="nav-icon">📝</span>申請</a>
    <a href="history.html" class="nav-item"><span class="nav-icon">📋</span>紀錄</a>
    <a href="schedule.html" class="nav-item"><span class="nav-icon">📅</span>排班</a>
    <a href="manager.html" class="nav-item" id="mgrBtn" style="display:none;"><span class="nav-icon">👑</span>主管</a>
  </nav>

  <script src="config.js"></script>

  <script>
    // ====== Login guard ======
    const empId = localStorage.getItem("empId") || localStorage.getItem("employeeId");
    if(!empId){
      location.href = "index.html";
    }

    // 初始化時檢查主管權限顯示按鈕
    if (localStorage.getItem("isManager") === "true") {
      document.getElementById("mgrBtn").style.display = "flex";
    }

    function toast(msg){
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.style.display = "block";
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(()=> el.style.display="none", 2400);
    }

    function assertConfig_(){
      if(!window.CONFIG){
        toast("config.js 未載入（找不到 CONFIG）");
        return false;
      }
      if(!window.CONFIG.GAS_ENDPOINT){
        toast("CONFIG.GAS_ENDPOINT 未設定");
        return false;
      }
      return true;
    }

    // ✅ 升級版：使用現代 fetch API 發送 POST 請求
    async function api(action, data={}) {
      if(!assertConfig_()){
        throw new Error("Missing CONFIG");
      }

      // 保留原本 app.html 附加 empId 與 webhookKey 的邏輯
      const payloadObj = Object.assign({}, data, {
        empId,
        webhookKey: window.CONFIG.WEBHOOK_KEY || ""
      });

      // 將 action 和資料包裝在一起
      const payloadBody = {
        action: action,
        payload: payloadObj
      };

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);

        const response = await fetch(window.CONFIG.GAS_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
          },
          body: JSON.stringify(payloadBody),
          redirect: 'follow',
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error(`HTTP 錯誤狀態碼: ${response.status}`);
        }

        const result = await response.json();
        return result;

      } catch (error) {
        console.error("API 呼叫失敗:", error);
        if (error.name === 'AbortError') {
           throw new Error("網路連線逾時，請稍後再試");
        }
        throw new Error("無法連線到伺服器，請檢查網路或防護外掛設定");
      }
    }

    // ✅ 將渲染邏輯獨立出來，給快取和 API 共同使用
    function renderMeData(res) {
      // 顯示到畫面上
      const name = (res.empName || "").trim() || empId;
      document.getElementById("hello").textContent = `Hi, ${name}`;
      document.getElementById("subline").textContent =
        `編號：${res.empId || empId}` + (res.isManager ? "｜主管" : "");

      // 相容餘額結構
      let annual = 0, comp = 0;
      if (res.balances) {
        if (res.balances.annualLeaveHoursLeft !== undefined) {
          annual = Number(res.balances.annualLeaveHoursLeft || 0);
          comp = Number(res.balances.otCompHoursLeft || 0);
        } else {
          annual = res.balances.annual ? Number(res.balances.annual.left || 0) : 0;
          comp = res.balances.comp ? Number(res.balances.comp.left || 0) : 0;
        }
      }
      
      document.getElementById("annualLeft").textContent = String(Math.max(0, annual));
      document.getElementById("compLeft").textContent = String(Math.max(0, comp));

      // 儲存常用狀態，供其他分頁使用
      localStorage.setItem("empName", name);
      localStorage.setItem("isManager", res.isManager ? "true" : "false");
      localStorage.setItem("canSchedule", res.canSchedule ? "true" : "false");

      if (res.isManager) {
        document.getElementById("mgrBtn").style.display = "flex";
      } else {
        document.getElementById("mgrBtn").style.display = "none";
      }
    }

    // ✅ SWR 核心機制：先讀快取，再偷偷背景更新
    async function loadMe(){
      const cacheKey = `me_cache_${empId}`;
      const cached = localStorage.getItem(cacheKey);

      // 1. 瞬間顯示上次的記憶
      if (cached) {
        try {
          renderMeData(JSON.parse(cached));
        } catch(e) {}
      }

      // 2. 背景偷偷向 Google 要最新資料
      try {
        const res = await api("get_me", {});
        if(res && res.ok){
          // 拿到最新資料，存入快取並覆蓋畫面
          localStorage.setItem(cacheKey, JSON.stringify(res));
          renderMeData(res);
        } else if (!cached) {
          toast("讀取失敗，請重新登入");
        }
      } catch(e) {
        if (!cached) toast("連線失敗（GAS）");
      }
    }

    // ====== GPS (真正取定位) ======
    function getGeo(){
      return new Promise((resolve, reject)=>{
        if(!navigator.geolocation){
          reject(new Error("這個瀏覽器不支援定位"));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos)=>{
            const lat = Number(pos.coords.latitude);
            const lng = Number(pos.coords.longitude); 
            const accuracy = Number(pos.coords.accuracy);

            if(!isFinite(lat) || !isFinite(lng)){
              reject(new Error("定位座標格式錯誤"));
              return;
            }
            resolve({ lat, lng, accuracy });
          },
          (err)=>{
            if(err && err.code === 1) reject(new Error("你拒絕了定位權限（請到瀏覽器設定開啟定位）"));
            else if(err && err.code === 2) reject(new Error("定位不可用（請開啟 GPS / 允許定位服務）"));
            else if(err && err.code === 3) reject(new Error("定位逾時（到戶外/窗邊再試一次）"));
            else reject(new Error("定位失敗"));
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      });
    }

    async function clock(act){
      const btnIn = document.getElementById("btnIn");
      const btnOut = document.getElementById("btnOut");
      btnIn.classList.add("disabled");
      btnOut.classList.add("disabled");

      try{
        toast("正在取得定位…");
        const geo = await getGeo();

        const res = await api(act, {
          lat: geo.lat,
          lng: geo.lng,
          accuracy: geo.accuracy,
          userAgent: navigator.userAgent || ""
        });

        if(res && res.ok){
          toast(res.message || "打卡成功");
        }else{
          toast((res && res.message) ? res.message : "打卡失敗");
        }
      }catch(e){
        toast(e && e.message ? e.message : "連線/定位失敗");
      }finally{
        setTimeout(()=>{
          btnIn.classList.remove("disabled");
          btnOut.classList.remove("disabled");
        }, 650);
      }
    }

    function logout(){
      localStorage.removeItem("empId");
      localStorage.removeItem("employeeId");
      localStorage.removeItem("empName");
      localStorage.removeItem("isManager");
      localStorage.removeItem("canSchedule");
      // 同時清除快取，避免登入別的帳號看到舊數字
      localStorage.removeItem(`me_cache_${empId}`);
      location.href = "index.html";
    }

    document.getElementById("btnLogout").addEventListener("click", logout);
    document.getElementById("btnIn").addEventListener("click", ()=>clock("clock_in"));
    document.getElementById("btnOut").addEventListener("click", ()=>clock("clock_out"));

    // 啟動載入
    loadMe();
  </script>
</body>
</html>
